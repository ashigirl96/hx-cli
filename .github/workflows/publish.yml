name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (leave empty for canary)"
        required: false
        type: choice
        options:
          - canary
          - patch
          - minor
          - major
  push:
    branches: [main]
    paths: [src/**, package.json]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test

      - name: Determine release type
        id: release
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "type=canary" >> "$GITHUB_OUTPUT"
          else
            echo "type=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump stable version
        if: steps.release.outputs.type != 'canary'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ steps.release.outputs.type }} -m "release: v%s"
          git push --follow-tags

      - name: Set canary version
        if: steps.release.outputs.type == 'canary'
        run: |
          SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          npm version "$(node -p "require('./package.json').version")-canary.${TIMESTAMP}.${SHA}" --no-git-tag-version

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish stable
        if: steps.release.outputs.type != 'canary'
        run: npm publish --provenance

      - name: Publish canary
        if: steps.release.outputs.type == 'canary'
        run: npm publish --provenance --tag canary
