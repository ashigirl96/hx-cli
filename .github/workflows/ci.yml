name: CI

on:
  push:
    branches: [main, init]
  pull_request:
    branches: [main, init]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run ci:check
      - run: bun run typecheck
      - run: bun test
